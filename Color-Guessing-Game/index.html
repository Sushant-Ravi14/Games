<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RGB Color Guesser</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
 
  <!-- Brand -->
  <div class="brand">
    <div class="brand-sub">Can you match it?</div>
    <div class="brand-title">RGB Color Guesser</div>
  </div>
 
  <!-- Target color display -->
  <div class="target-wrap">
    <div class="target-label">Match this color ↓</div>
    <div class="target-box">
      <div id="colorDisplay">rgb(0, 0, 0)</div>
      <div class="channel-breakdown">
        <div class="channel r"><div class="dot"></div><span>R: </span><span class="val" id="chR">0</span></div>
        <div class="channel g"><div class="dot"></div><span>G: </span><span class="val" id="chG">0</span></div>
        <div class="channel b"><div class="dot"></div><span>B: </span><span class="val" id="chB">0</span></div>
      </div>
    </div>
  </div>
 
  <!-- Message -->
  <div class="message neutral" id="message">Pick the matching swatch!</div>
 
  <!-- Attempts (wrong guess pips) -->
  <div class="attempts-row" id="attemptsRow"></div>
 
  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card">
      <div class="label">Current Streak</div>
      <div class="num" id="currentStreak">0</div>
    </div>
    <div class="score-card best">
      <div class="label">Best Streak</div>
      <div class="num" id="bestStreak">0</div>
    </div>
  </div>
 
  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-new" id="newRoundBtn">↻ New Round</button>
    <button class="btn btn-mode selected" id="easyBtn">Easy (3)</button>
    <button class="btn btn-mode" id="hardBtn">Hard (6)</button>
    <button class="btn btn-reset" id="resetStreakBtn">✕ Reset</button>
  </div>
 
  <!-- Difficulty badge -->
  <div class="difficulty-badge" id="diffBadge">Mode: Easy · 3 swatches</div>
 
  <!-- Color swatches -->
  <div class="grid-wrap">
    <div class="grid-label">Choose a swatch</div>
    <div id="colorBoxContainer">
      <div class="color-box"></div>
      <div class="color-box"></div>
      <div class="color-box"></div>
      <div class="color-box"></div>
      <div class="color-box"></div>
      <div class="color-box"></div>
    </div>
  </div>
 
  <!-- Win/Result overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlayEmoji">🎯</div>
      <div class="overlay-swatch" id="overlaySwatch"></div>
      <div class="overlay-title" id="overlayTitle">Correct!</div>
      <div class="overlay-sub" id="overlaySub"></div>
      <div class="overlay-btns">
        <button class="btn btn-new" id="overlayNext">↻ Next Round</button>
        <button class="btn btn-reset" id="overlayReset">✕ Reset All</button>
      </div>
    </div>
  </div>
 
  <script src="script.js"></script>

</body>
</html>
