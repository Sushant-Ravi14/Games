<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic‑Tac‑Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css">
</head>
<body>
 
  <h1 class="title">TIC-TAC-TOE</h1>
 
  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card o-card">
      <div class="player-name">O · Player 1</div>
      <div class="player-label" id="name1">Player 1</div>
      <div class="score-num" id="score1">0</div>
    </div>
    <div class="score-divider">vs</div>
    <div class="score-card x-card">
      <div class="player-name">X · Player 2</div>
      <div class="player-label" id="name2">Player 2</div>
      <div class="score-num" id="score2">0</div>
    </div>
  </div>
 
  <!-- Turn indicator -->
  <div class="status" id="status">— —</div>
 
  <!-- Game grid -->
  <div class="grid" id="grid">
    <button class="cell" data-i="0"></button>
    <button class="cell" data-i="1"></button>
    <button class="cell" data-i="2"></button>
    <button class="cell" data-i="3"></button>
    <button class="cell" data-i="4"></button>
    <button class="cell" data-i="5"></button>
    <button class="cell" data-i="6"></button>
    <button class="cell" data-i="7"></button>
    <button class="cell" data-i="8"></button>
  </div>
 
  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-reset" id="btnReset">↺ Reset</button>
    <button class="btn btn-new"   id="btnNew">⊕ New Game</button>
  </div>
 
  <!-- Win / Draw overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlayEmoji">🏆</div>
      <div class="overlay-title" id="overlayTitle">Winner!</div>
      <div class="overlay-name"  id="overlayName"></div>
      <div class="overlay-btns">
        <button class="btn btn-reset" id="overlayReset">↺ Play Again</button>
        <button class="btn btn-new"   id="overlayNew">⊕ New Game</button>
      </div>
    </div>
  </div>
 
  <script src="index.js"></script>

</body>
</html>
